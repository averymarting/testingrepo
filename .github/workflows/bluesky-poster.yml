name: Bluesky Auto Poster
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      account_row:
        description: "Account row number from Sheet1 (1 = first account after header). All other settings (ratios, hashtags, links, report, etc.) now live in Sheet1 itself and are re-read from the sheet on every posting cycle — edit them there any time."
        default: "1"
concurrency:
  group: bluesky-poster
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib atproto Pillow requests beautifulsoup4
      - name: Run poster loop
        run: python -u postnow_status_post.py
        env:
          PYTHONUNBUFFERED: "1"
          # Token URL is hardcoded inside postnow_status_post.py — no secret
          # or repo variable needed. Nothing to configure here.
          #
          # ACCOUNT_ROW is the only setting that stays pinned at the
          # GitHub/repo level on purpose — it's "which Sheet1 row does this
          # repo/runner belong to". Everything else (image/video ratio,
          # hashtag toggles, link toggles + %, max image size, report
          # settings, post-plan tab name, and the optional cross-repo lock)
          # is read live from Sheet1 on every posting cycle, so you can
          # change it any time directly in Google Sheets without touching
          # this workflow or redeploying.
          ACCOUNT_ROW: ${{ github.event.inputs.account_row || vars.ACCOUNT_ROW || '1' }}
      - name: Disable workflow on permanent failure
        if: failure()
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
